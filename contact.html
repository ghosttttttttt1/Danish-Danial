<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Danish Danial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #1a252f; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        nav { width: 85%; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { color: #fff; font-size: 24px; font-weight: bold; }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: #bdc3c7; text-decoration: none; font-size: 16px; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: #3498db; font-weight: bold; }
        main { flex: 1; }
        .container { width: 70%; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 15px; color: #2c3e50; }
        p { line-height: 1.6; margin-bottom: 15px; }
        .contact-form { display: flex; flex-direction: column; margin-top: 20px; }
        .contact-form label { margin-bottom: 5px; font-weight: bold; }
        .contact-form input, .contact-form textarea { padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn { display: inline-block; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; background-color: #3498db; color: white; border: none; cursor: pointer; align-self: flex-start; transition: 0.3s; }
        .btn:hover { background-color: #2980b9; }
        footer { background-color: #1a252f; color: #fff; text-align: center; padding: 15px 0; font-size: 14px; }
        @media (max-width: 768px) { nav { flex-direction: column; } nav ul { margin-top: 15px; } .container { width: 90%; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Danish Portfolio</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h1>Hubungi Saya</h1>
            <p>Jika anda mempunyai sebarang soalan, cadangan kolaborasi atau peluang projek, sila isi borang di bawah:</p>
            <form class="contact-form" onsubmit="alert('Mesej berjaya dihantar! (Simulasi)'); return false;">
                <label for="name">Nama:</label>
                <input type="text" id="name" placeholder="Masukkan nama anda" required>
                <label for="email">Emel:</label>
                <input type="email" id="email" placeholder="Masukkan emel anda" required>
                <label for="message">Mesej:</label>
                <textarea id="message" rows="5" placeholder="Tulis mesej anda di sini..." required></textarea>
                <button type="submit" class="btn">Hantar Mesej</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Danish Danial. Hak Cipta Terpelihara | Tugasan CSD 34203</p>
    </footer>
</body>
</html>
